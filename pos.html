
<html>
<head>
<meta charset="UTF-8">
<title>POS SYSTEM</title>

<style>

body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background-color: #1f232b;
    color: #e2e8f0;
}

.container {
    display: flex;
    width: 100%;
    height: 100vh;
}


.left {
    width: 60%;
    padding: 20px;
    box-sizing: border-box;
    overflow-y: auto;
    border-right: 1px solid #38404e;
}

.right {
    width: 40%;
    background-color: #171a21;
    padding: 20px;
    box-sizing: border-box;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

h3 {
    margin: 0 0 12px 0;
    font-size: 15px;
    font-weight: 600;
    color: #94a3b8;
}


.section {
    background-color: #282f3b;
    border: 1px solid #38404e;
    border-radius: 4px;
    padding: 15px;
    margin-bottom: 25px;
    display: flex;
    gap: 10px;
    align-items: center;
}


input, select {
    background-color: #1f232b;
    border: 1px solid #475569;
    color: #ffffff;
    padding: 8px 12px;
    font-size: 14px;
    border-radius: 4px;
    outline: none;
    height: 36px;
    box-sizing: border-box;
}

input {
    flex: 1;
}

select {
    flex: 1.5;
    cursor: pointer;
    padding-right: 30px;
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    appearance: none;
}

input:focus, select:focus {
    border-color: #3b82f6;
}

button {
    background-color: #3b82f6;
    color: #ffffff;
    border: none;
    padding: 0 16px;
    height: 36px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #2563eb;
}


.btn-delete {
    background: none;
    border: none;
    color: #ef4444;
    padding: 0 4px;
    margin-left: 8px;
    height: auto;
    font-size: 13px;
    font-weight: normal;
    cursor: pointer;
}

.btn-delete:hover {
    background: none;
    color: #f87171;
    text-decoration: underline;
}


table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 25px;
    background-color: #282f3b;
    border: 1px solid #38404e;
}

th {
    background-color: #38404e;
    color: #cbd5e1;
    font-weight: 600;
    font-size: 13px;
    text-align: left;
    padding: 10px 12px;
}

td {
    padding: 10px 12px;
    border-bottom: 1px solid #38404e;
    font-size: 14px;
}

tr:last-child td {
    border-bottom: none;
}


.left h3:has(#total) {
    font-size: 22px;
    color: #ffffff;
    margin: 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #38404e;
    padding-top: 15px;
}


button[onclick="pay()"] {
    background-color: #10b981;
    width: 100%;
    height: 44px;
    font-size: 14px;
    font-weight: 600;
}

button[onclick="pay()"]:hover {
    background-color: #059669;
}


#stockList {
    margin-bottom: 20px;
}

#stockList div {
    background-color: #282f3b;
    border: 1px solid #38404e;
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 4px;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}


#qrBox {
    display: none;
    text-align: center;
    padding: 20px;
    background-color: #282f3b;
    border: 1px solid #38404e;
    border-radius: 4px;
    margin-top: auto;
}

#qrBox h3 {
    color: #ffffff;
    margin-bottom: 12px;
}

#qrBox img {
    width: 160px;
    height: 160px;
    border: 6px solid #ffffff;
    border-radius: 2px;
    display: inline-block;
}

#qrBox button {
    background-color: #475569;
    width: 100%;
    margin-top: 12px;
}

#qrBox button:hover {
    background-color: #334155;
}


#printArea {
    display: none;
}
</style>

</head>

<body>

<div class="container">

<div class="left">

<h3>Stock Entry</h3>

<div class="section">
<input id="s_name" placeholder="Item Name">
<input id="s_price" placeholder="Price (Rs.)">
<input id="s_qty" placeholder="Qty">
<button onclick="addStock()">Add Stock</button>
</div>

<h3>Sell</h3>

<div class="section">
<select id="sell_select"></select>
<input id="sell_qty" placeholder="Qty">
<button onclick="sellItem()">Add to Cart</button>
</div>

<table>
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price (Rs.)</th>
<th>Total (Rs.)</th>
</tr>
</thead>
<tbody id="cart"></tbody>
</table>

<h3>Total: Rs. <span id="total">0</span></h3>

<button onclick="pay()">PAY & PRINT</button>

</div>

<div class="right">

<div>
    <h3>Stock List</h3>
    <div id="stockList"></div>
</div>

<div id="qrBox">
    <h3>Scan For Payment</h3>
    <img src="1.jpg.jpeg" alt="QR">
    <br><br>
    <button onclick="done()">DONE</button>
</div>

</div>

</div>

<div id="printArea"></div>

<script>

let stock = [];
let cart = [];


function saveBackup() {
    localStorage.setItem("pos_stock_backup", JSON.stringify(stock));
    localStorage.setItem("pos_cart_backup", JSON.stringify(cart));
}

function loadBackup() {
    let savedStock = localStorage.getItem("pos_stock_backup");
    let savedCart = localStorage.getItem("pos_cart_backup");
    
    if (savedStock) stock = JSON.parse(savedStock);
    if (savedCart) cart = JSON.parse(savedCart);
    
    updateStock();
    updateSelect();
    renderCart();
}


window.addEventListener("beforeunload", function () {
    saveBackup();
});


function addStock(){

    let name = document.getElementById("s_name").value;
    let price = parseFloat(document.getElementById("s_price").value);
    let qty = parseInt(document.getElementById("s_qty").value);

    if(!name || !price || !qty) return alert("Fill all");

    stock.push({
        id:Date.now(),
        name,
        price,
        qty
    });

    updateStock();
    updateSelect();
    saveBackup(); // Instant backup trigger
}


function deleteStock(id) {
    stock = stock.filter(s => s.id !== id);
    updateStock();
    updateSelect();
    saveBackup();
}


function updateStock(){

    let div = document.getElementById("stockList");
    div.innerHTML = "";

    stock.forEach(s=>{
        div.innerHTML += `
        <div>
            <span><strong>${s.name}</strong></span>
            <span style="color: #94a3b8; display: flex; align-items: center;">
                ${s.qty} units • Rs. ${s.price}
                <button class="btn-delete" onclick="deleteStock(${s.id})">[x]</button>
            </span>
        </div>`;
    });
}


function updateSelect(){

    let sel = document.getElementById("sell_select");
    sel.innerHTML = "";

    stock.forEach((s,i)=>{
        sel.innerHTML += `<option value="${i}">
            ${s.name} (${s.qty} available)
        </option>`;
    });
}


function sellItem(){

    let i = document.getElementById("sell_select").value;
    let qty = parseInt(document.getElementById("sell_qty").value);

    if(!qty || qty <= 0) return alert("Enter qty");
    if(!stock[i]) return alert("Select a valid item");
    if(stock[i].qty < qty) return alert("Not enough stock");

    
    stock[i].qty -= qty;

    
    cart.push({
        name: stock[i].name,
        qty: qty,
        price: stock[i].price
    });

    
    stock = stock.filter(s => s.qty > 0);

    updateStock();
    updateSelect();
    renderCart();
    saveBackup(); // Instant backup trigger
}


function renderCart(){

    let tbody = document.getElementById("cart");
    tbody.innerHTML = "";

    let total = 0;

    cart.forEach(c=>{
        let t = c.qty * c.price;
        total += t;

        tbody.innerHTML += `
        <tr>
            <td><strong>${c.name}</strong></td>
            <td>${c.qty}</td>
            <td>${c.price}</td>
            <td><strong>${t}</strong></td>
        </tr>`;
    });

    document.getElementById("total").innerText = total;
}

function pay(){

    document.getElementById("qrBox").style.display = "block";
}


function done(){

    let printContent = document.getElementById("printArea");

    let html = `
    <style>
        .bill-body { 
            font-family: 'Courier New', Courier, monospace; 
            max-width: 300px; 
            margin: 0 auto; 
            color: #000;
            padding: 10px;
        }
        .bill-title { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        .bill-sub { text-align: center; font-size: 12px; margin-bottom: 15px; color: #555; }
        .bill-divider { border-top: 1px dashed #000; margin: 10px 0; }
        .bill-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .bill-table th { text-align: left; border-bottom: 1px dashed #000; padding-bottom: 5px; }
        .bill-table td { padding: 6px 0; vertical-align: top; }
        .text-right { text-align: right; }
        .bill-total-row { font-size: 15px; font-weight: bold; }
        .bill-footer { text-align: center; font-size: 11px; margin-top: 20px; color: #555; }
    </style>
    <div class="bill-body">
        <div class="bill-title">Business Name</div>
        <div class="bill-sub">Date: ${new Date().toLocaleDateString()}</div>
        <div class="bill-divider"></div>
        <table class="bill-table">
            <thead>
                <tr>
                    <th>Item Description</th>
                    <th class="text-right">Qty</th>
                    <th class="text-right">Price (Rs.)</th>
                </tr>
            </thead>
            <tbody>`;

    let total = 0;

    cart.forEach(c => {
        let t = c.qty * c.price;
        total += t;
        html += `
                <tr>
                    <td>${c.name}<br><small style="color:#666;">@ Rs. ${c.price}</small></td>
                    <td class="text-right">${c.qty}</td>
                    <td class="text-right">${t.toFixed(2)}</td>
                </tr>`;
    });

    html += `
            </tbody>
        </table>
        <div class="bill-divider"></div>
        <table class="bill-table">
            <tr class="bill-total-row">
                <td>Paid Amount:</td>
                <td class="text-right">Rs. ${total.toFixed(2)}</td>
            </tr>
        </table>
        <div class="bill-divider"></div>
        <div class="bill-footer">Thank you for your purchase!</div>
    </div>`;

    printContent.innerHTML = html;

    let w = window.open("");
    w.document.write(printContent.innerHTML);
    w.print();
    w.close();

    cart = [];
    renderCart();
    saveBackup(); 

    document.getElementById("qrBox").style.display = "none";
}

 
loadBackup();


</script>

</body>
</html>
